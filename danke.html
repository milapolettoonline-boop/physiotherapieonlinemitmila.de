<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vielen Dank!</title>

    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: 'Inter', sans-serif;
            background-color: #f7f4ef; /* bege claro elegante */
            color: #1a1a1a; /* preto suave */
        }

        .container {
            max-width: 700px;
            margin: 80px auto;
            background: #ffffff;
            padding: 40px;
            border-radius: 12px;
            box-shadow: 0 0 20px rgba(0,0,0,0.08);
            text-align: center;
        }

        h1 {
            font-size: 2.2rem;
            margin-bottom: 20px;
            color: #1a1a1a;
        }

        p {
            font-size: 1.1rem;
            margin-bottom: 15px;
            color: #333;
        }

        .btn {
            display: inline-block;
            margin-top: 25px;
            padding: 12px 28px;
            background-color: #d4af37; /* dourado */
            color: #fff;
            text-decoration: none;
            font-weight: 600;
            border-radius: 8px;
            transition: 0.3s;
        }

        .btn:hover {
            background-color: #b8922d; /* dourado mais escuro */
        }
    </style>
</head>

<body>
    <section class="container">
        <h1>Vielen Dank für Ihre Anfrage!</h1>
        <p>Ihre Aktion wurde erfolgreich abgeschlossen.</p>
        <p>Sie erhalten in Kürze weitere Informationen.</p>

        <a href="index.html" class="btn">Zurück zur Startseite</a>
    </section>
</body>
</html>
